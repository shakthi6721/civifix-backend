version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: civifix-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: civifix_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - civifix_network
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: civifix-backend
    environment:
      ENV: development
      MONGODB_URL: mongodb://root:mongo_password@mongodb:27017/civifix_db?authSource=admin
      DATABASE_NAME: civifix_db
      JWT_SECRET_KEY: super-secret-key-change-in-production
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-production
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - civifix_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongodb_data:
  mongodb_config:

networks:
  civifix_network:
    driver: bridge
